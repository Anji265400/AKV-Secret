name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Step 1: Checkout Code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 Step 2: Login to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }

    # 🔹 Step 3: Fetch secrets from Key Vault
    - name: Get Secrets from Key Vault
      uses: azure/get-keyvault-secrets@v1
      with:
        keyvault: ${{ secrets.KEYVAULT_NAME }}
        secrets: username,password,appsecret

    # 🔹 Step 4: Build Docker Image
    - name: Build Docker Image
      run: docker build -t myapp:latest .

    # 🔹 Step 5: Trivy Scan
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: myapp:latest

    # 🔹 Step 6: Checkov Scan
    - name: Checkov Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .

    # 🔹 Step 7: Docker Login to ACR
    - name: Docker Login
      run: echo $password | docker login testacr2654.azurecr.io -u $username --password-stdin

    # 🔹 Step 8: Tag and Push Image
    - name: Push Image
      run: |
        docker tag myapp:latest testacr2654.azurecr.io/myapp:latest
        docker push testacr2654.azurecr.io/myapp:latest

    # 🔹 Step 9: Deploy to Azure Container Instance
    - name: Deploy to Azure
      run: |
        az container create \
          --resource-group test-group \
          --name myapp \
          --image testacr2654.azurecr.io/myapp:latest \
          --registry-login-server testacr2654.azurecr.io \
          --registry-username $username \
          --registry-password $password \
          --dns-name-label myapp-demo-$RANDOM \
          --ports 5000
          --os-type Linux